apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-backend
  namespace: quiz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: quiz-backend
    spec:
      containers:
        - name: backend
          image: amerenda/quiz:backend-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgres://quiz:$(DB_PASSWORD)@mac-mini.amer.dev:5432/quiz"
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: secret
            - name: GITHUB_ALLOWED_USERS
              value: "amerenda"
            - name: APP_ORIGIN
              value: "https://quiz.amer.dev"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
