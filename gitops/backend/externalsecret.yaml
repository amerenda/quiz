apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-oauth
  namespace: quiz
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: github-oauth
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: quiz-github-client-id
        property: password
    - secretKey: client-secret
      remoteRef:
        key: quiz-github-client-secret
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: session-secret
  namespace: quiz
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: session-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: quiz-session-secret
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: quiz
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: quiz-postgres-password
        property: password
