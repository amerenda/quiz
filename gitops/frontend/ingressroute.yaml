apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: quiz-frontend
  namespace: quiz
  annotations:
    external-dns.alpha.kubernetes.io/hostname: quiz.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  entryPoints:
    - websecure
  tls:
    secretName: quiz-amer-dev-tls
  routes:
    # Admin paths — Tailscale only
    - match: Host(`quiz.amer.dev`) && (PathPrefix(`/admin`) || PathPrefix(`/api/admin`) || PathPrefix(`/auth`))
      kind: Rule
      priority: 100
      services:
        - name: quiz-frontend
          port: 80
      middlewares:
        - name: tailscale-only
          namespace: quiz
    # Public paths
    - match: Host(`quiz.amer.dev`)
      kind: Rule
      priority: 1
      services:
        - name: quiz-frontend
          port: 80
