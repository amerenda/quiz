apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tailscale-only
  namespace: quiz
spec:
  ipAllowList:
    sourceRange:
      - 10.100.20.0/24   # direct LAN
      - 10.42.0.0/16     # Flannel pod CIDR (Tailscale subnet router masquerades here)
      - 127.0.0.1/32     # localhost/healthchecks
